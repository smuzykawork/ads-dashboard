name: Fetch Facebook Ads Data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch data from Facebook
        env:
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          FB_ACCOUNT_IDS: ${{ secrets.FB_ACCOUNT_IDS }}
        run: |
          mkdir -p data
          node <<'EOF'
          const fs = require('fs');
          const https = require('https');

          const token = process.env.FB_ACCESS_TOKEN;
          const accountIds = process.env.FB_ACCOUNT_IDS.split(',').map(s => s.trim());
          const apiVersion = 'v19.0';

          function fetch(url) {
            return new Promise((resolve, reject) => {
              https.get(url, res => {
                let body = '';
                res.on('data', c => body += c);
                res.on('end', () => {
                  try { resolve(JSON.parse(body)); }
                  catch(e) { reject(e); }
                });
              }).on('error', reject);
            });
          }

          async function getAccountInfo(accountId) {
            const url = `https://graph.facebook.com/${apiVersion}/${accountId}?fields=name,account_id,currency&access_token=${token}`;
            return await fetch(url);
          }

          async function getCampaigns(accountId) {
            const url = `https://graph.facebook.com/${apiVersion}/${accountId}/campaigns?fields=id,name,status,objective&limit=200&access_token=${token}`;
            const r = await fetch(url);
            return r.data || [];
          }

          async function getInsights(accountId) {
            const fields = 'campaign_id,campaign_name,spend,impressions,clicks,actions,date_start,date_stop';
            const url = `https://graph.facebook.com/${apiVersion}/${accountId}/insights?fields=${fields}&level=campaign&time_increment=1&date_preset=last_90d&limit=500&access_token=${token}`;
            const r = await fetch(url);
            let all = r.data || [];
            let next = r.paging && r.paging.next;
            while (next) {
              const r2 = await fetch(next);
              all = all.concat(r2.data || []);
              next = r2.paging && r2.paging.next;
            }
            return all;
          }

          function extractLeads(actions) {
            if (!actions) return 0;
            let leads = 0;
            for (const a of actions) {
              if (a.action_type === 'lead' ||
                  a.action_type === 'onsite_conversion.lead_grouped' ||
                  a.action_type === 'offsite_conversion.fb_pixel_lead' ||
                  a.action_type.endsWith('.lead')) {
                leads += parseInt(a.value) || 0;
              }
            }
            return leads;
          }

          (async () => {
            const result = {
              generated_at: new Date().toISOString(),
              projects: []
            };

            for (const accId of accountIds) {
              try {
                console.log(`Fetching ${accId}...`);
                const info = await getAccountInfo(accId);
                const campaigns = await getCampaigns(accId);
                const insights = await getInsights(accId);

                const project = {
                  account_id: accId,
                  name: info.name || accId,
                  currency: info.currency || 'UAH',
                  campaigns: campaigns.map(c => ({
                    id: c.id,
                    name: c.name,
                    status: c.status,
                    objective: c.objective
                  })),
                  daily: insights.map(i => ({
                    date: i.date_start,
                    campaign_id: i.campaign_id,
                    campaign_name: i.campaign_name,
                    spend: parseFloat(i.spend) || 0,
                    impressions: parseInt(i.impressions) || 0,
                    clicks: parseInt(i.clicks) || 0,
                    leads: extractLeads(i.actions)
                  }))
                };
                result.projects.push(project);
                console.log(`OK ${info.name}: ${campaigns.length} campaigns, ${insights.length} daily rows`);
              } catch (e) {
                console.error(`Error for ${accId}:`, e.message);
              }
            }

            fs.writeFileSync('data/ads.json', JSON.stringify(result, null, 2));
            console.log('Saved to data/ads.json');
          })();
          EOF

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ads.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Update ads data $(date -u +%Y-%m-%d_%H:%M)"
            git push
          fi
